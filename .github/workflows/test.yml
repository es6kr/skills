name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  bats:
    name: Structure Tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@2.0.0
        with:
          tests: tests/
          timing: true

  pytest:
    name: Deploy Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest tests -v

  hangul-check:
    name: Korean Text Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check-hangul.py skills
      # The repo is PUBLIC and English-only: every tracked .md/.sh is publishing
      # surface, not just skills/. A Korean workspace-local rule file under
      # .claude/rules/ once slipped through the skills-only scan (2026-07-01).
      - name: Korean check on tracked non-skills text files
        run: |
          set -eu
          FAIL=0
          for f in $(git ls-files '*.md' '*.sh' | grep -v '^skills/'); do
            if grep -qP '[\x{AC00}-\x{D7A3}]' "$f"; then
              echo "::error file=$f::Korean text found in tracked non-skills file"
              grep -nP '[\x{AC00}-\x{D7A3}]' "$f" | head -3
              FAIL=1
            fi
          done
          exit "$FAIL"

  frontmatter-lint:
    name: SKILL.md Frontmatter Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/lint-frontmatter.sh
