name: publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    # Phase 3 staged-rollout gate — remove after 2 successful publish runs.
    # See the Phase 3 plan posted on issue #7.
    environment: clawhub-publish
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          SLUG="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          if [ -z "$SLUG" ] || [ -z "$VERSION" ] || [ "$SLUG" = "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match '<slug>-v<version>' pattern"
            exit 1
          fi
          echo "slug=$SLUG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify skill directory
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          if [ ! -d "skills/$SLUG" ]; then
            echo "::error::skills/$SLUG directory not found — skipping non-skill release tag"
            exit 1
          fi

      - name: Ensure LICENSE present in skill directory
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          # opensource.md "LICENSE 위치 정책": LICENSE is a publish-time artifact and
          # is not git-tracked under skills/<slug>/. Guarantee its presence here so
          # `clawhub publish` always ships LICENSE alongside SKILL.md and topics.
          if [ -f "skills/$SLUG/LICENSE" ]; then
            echo "skills/$SLUG/LICENSE already present"
          elif [ -f LICENSE ]; then
            cp LICENSE "skills/$SLUG/LICENSE"
            echo "Copied repo-root LICENSE into skills/$SLUG/"
          else
            echo "::error::No LICENSE found in skills/$SLUG/ or repo root — publish would ship without a license"
            exit 1
          fi

      - name: Install ClawHub CLI
        run: npm install -g clawhub@0.17.0

      - name: Authenticate
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          VERSION: ${{ steps.parse.outputs.version }}
          BODY: ${{ github.event.release.body }}
        run: |
          clawhub publish "skills/$SLUG" \
            --slug "$SLUG" \
            --version "$VERSION" \
            --changelog "$BODY" \
            --tags latest

      - name: Verify
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          # `clawhub inspect` returns the metadata page; grep for the version we just pushed.
          clawhub inspect "$SLUG" | grep -F "Latest: $VERSION"
