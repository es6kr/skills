name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., skill-kit-v0.3.0)'
        required: true
        type: string
      allow_first_1_0:
        description: 'Override first-1.0 publish guard (set true only when a 1.0.0 jump is genuinely intended)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    steps:
      - name: Parse tag
        id: parse
        env:
          # release event ships the tag in github.event.release.tag_name.
          # workflow_dispatch ships it in github.event.inputs.tag_name.
          # release-please.yml dispatches us with the latter when GITHUB_TOKEN
          # creates the release (recursive-workflow restriction).
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}
        run: |
          SLUG="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          if [ -z "$SLUG" ] || [ -z "$VERSION" ] || [ "$SLUG" = "$TAG" ]; then
            echo "::error::Tag '$TAG' does not match '<slug>-v<version>' pattern"
            exit 1
          fi
          echo "slug=$SLUG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag_name }}

      - name: Verify skill directory
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          if [ ! -d "skills/$SLUG" ]; then
            echo "::error::skills/$SLUG directory not found — skipping non-skill release tag"
            exit 1
          fi

      - name: Guard against first-publish 1.0.0 jump
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          VERSION: ${{ steps.parse.outputs.version }}
          ALLOW_OVERRIDE: ${{ github.event.inputs.allow_first_1_0 }}
        run: |
          # Block accidental 0.0.0 -> 1.0.0 jumps caused by release-please default
          # behavior when "bump-minor-pre-major" is not true. See:
          #   docs/generated/report-choco-1.0.0-overbump.md
          #   ~/.agents/.claude/rules/release-please-scope.md
          #     "신규 published skill 초기 version 등록" / "Major bump trigger 사용 사전 ask"
          if [ "$VERSION" != "1.0.0" ]; then
            echo "OK: version $VERSION is not the guarded 1.0.0 pattern"
            exit 0
          fi
          if [ "${ALLOW_OVERRIDE:-false}" = "true" ]; then
            echo "Override accepted (workflow_dispatch input allow_first_1_0=true). Proceeding with $SLUG@1.0.0."
            exit 0
          fi
          # 1.0.0 publish + no override: only allowed when at least one prior
          # publish exists for this slug. Without prior history, this is a
          # first-publish 1.0.0 jump which must be confirmed manually.
          if clawhub inspect "$SLUG" 2>/dev/null | grep -qE '(Latest:|Versions:)'; then
            echo "OK: $SLUG has prior publish history. 1.0.0 here is a deliberate stable promotion."
            exit 0
          fi
          cat <<EOF
          ::error::Refusing to publish first release of '$SLUG' at version 1.0.0.
          A first-publish 1.0.0 is almost always a release-please default-bump artifact
          (pre-1.0 + feat: with bump-minor-pre-major != true → 1.0.0 jump).
          If the 1.0.0 release is genuinely intended:
            1. Run this workflow via 'Actions → publish → Run workflow' and set
               allow_first_1_0 = true with tag_name = $SLUG-v1.0.0.
            2. Or amend the release-please release PR to a 0.x.x version first.
          See docs/generated/report-choco-1.0.0-overbump.md and the rules referenced above.
          EOF
          exit 1

      - name: Ensure LICENSE present in skill directory
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          # opensource.md "LICENSE 위치 정책": LICENSE is a publish-time artifact and
          # is not git-tracked under skills/<slug>/. Guarantee its presence here so
          # `clawhub publish` always ships LICENSE alongside SKILL.md and topics.
          if [ -f "skills/$SLUG/LICENSE" ]; then
            echo "skills/$SLUG/LICENSE already present"
          elif [ -f LICENSE ]; then
            cp LICENSE "skills/$SLUG/LICENSE"
            echo "Copied repo-root LICENSE into skills/$SLUG/"
          else
            echo "::error::No LICENSE found in skills/$SLUG/ or repo root — publish would ship without a license"
            exit 1
          fi

      - name: Install ClawHub CLI
        run: npm install -g clawhub@0.17.0

      - name: Authenticate
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          VERSION: ${{ steps.parse.outputs.version }}
          BODY: ${{ github.event.release.body }}
        run: |
          clawhub publish "skills/$SLUG" \
            --slug "$SLUG" \
            --version "$VERSION" \
            --changelog "$BODY" \
            --tags latest

      - name: Verify
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          # `clawhub inspect` returns the metadata page; grep for the version we just pushed.
          clawhub inspect "$SLUG" | grep -F "Latest: $VERSION"
