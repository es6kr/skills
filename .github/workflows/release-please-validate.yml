name: release-please-validate

on:
  pull_request:
    paths:
      - release-please-config.json
      - .release-please-manifest.json
      - .github/workflows/release-please-validate.yml
  push:
    branches: [main]
    paths:
      - release-please-config.json
      - .release-please-manifest.json

permissions:
  contents: read

jobs:
  validate-pre-major-options:
    name: pre-major guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Verify bump-minor-pre-major is true
        run: |
          set -euo pipefail
          VALUE=$(jq -r '."bump-minor-pre-major" // "null"' release-please-config.json)
          if [ "$VALUE" != "true" ]; then
            cat <<EOF
          ::error file=release-please-config.json::"bump-minor-pre-major" must be true.
          Current value: $VALUE
          Reason: release-please default treats pre-1.0 + feat: as a stable-1.0 promotion,
          which has caused unintended 0.0.0 -> 1.0.0 jumps (see docs/generated/report-choco-1.0.0-overbump.md).
          Set "bump-minor-pre-major": true so 0.x + feat: yields 0.(x+1).0 instead.
          Docs: https://github.com/googleapis/release-please/blob/main/docs/customizing.md#bump-minor-pre-major
          EOF
            exit 1
          fi
          echo "OK: bump-minor-pre-major = true"

      - name: Verify bump-patch-for-minor-pre-major is false
        run: |
          set -euo pipefail
          # NOTE: jq's // alternative operator treats false as empty, so
          # `."key" // "null"` would turn a legitimate `false` into "null".
          # Use tostring instead: false -> "false", missing key -> "null".
          VALUE=$(jq -r '."bump-patch-for-minor-pre-major" | tostring' release-please-config.json)
          if [ "$VALUE" != "false" ]; then
            cat <<EOF
          ::error file=release-please-config.json::"bump-patch-for-minor-pre-major" must be false so that pre-1.0 feat: bumps as minor (0.x.y -> 0.(x+1).0). This encodes the "new-topic = minor bump" policy: only feat commits (which land on the next-feat staging branch and represent a genuine skill topic addition) should raise the minor version. fix: remains patch by default.
          Current value: $VALUE
          EOF
            exit 1
          fi
          echo "OK: bump-patch-for-minor-pre-major = false"

  validate-new-component-versions:
    name: new-component initial version guard
    runs-on: ubuntu-latest
    # Runs on pull_request only — direct pushes to main bypass this guard.
    # Accepted residual risk: main is branch-protected against direct push, so
    # the bypass path is unreachable in practice. If branch protection is ever
    # removed, add a push-event variant of this job that diffs HEAD~1..HEAD.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require new manifest entries to start at a pre-major 0.1.0+ version
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git show "$BASE_SHA:.release-please-manifest.json" > /tmp/base-manifest.json 2>/dev/null || echo '{}' > /tmp/base-manifest.json
          git show "$HEAD_SHA:.release-please-manifest.json" > /tmp/head-manifest.json

          # Keys present in head but not in base = newly introduced components
          NEW_KEYS=$(jq -r --slurpfile base /tmp/base-manifest.json '
            keys[] as $k
            | select($base[0][$k] == null)
            | $k
          ' /tmp/head-manifest.json)

          if [ -z "$NEW_KEYS" ]; then
            echo "No new manifest entries in this PR."
            exit 0
          fi

          echo "New manifest entries:"
          echo "$NEW_KEYS"

          # A breaking-change commit must not ride in on a new-component PR:
          # while major=0, a breaking marker can push the component's first
          # release, and the resulting git tag is immutable even if publish.yml
          # later blocks the ClawHub publish. The removed split-policy step used
          # to cover this; re-assert it narrowly here for new-component PRs.
          if git log --format='%s%n%b' "$BASE_SHA..$HEAD_SHA" \
               | grep -qE '^[a-z]+(\([^)]+\))?!:|BREAKING[ -]CHANGE:'; then
            echo "::error file=.release-please-manifest.json::This PR registers new components ($NEW_KEYS) and also carries a breaking-change commit (type!: or BREAKING CHANGE:). A breaking marker on a pre-major (0.x) new component risks a 1.0.0 promotion whose git tag is immutable. Split the breaking change into a separate PR."
            exit 1
          fi

          # Policy: a new component must register at a pre-major version 0.1.0 or
          # higher (major = 0, minor >= 1) — never 0.0.0 and never >= 1.0.0.
          #
          # Why not 0.0.0: release-please promotes a fresh 0.0.0 component's first
          # `feat` straight to 1.0.0 even under bump-minor-pre-major=true (only a
          # first `fix` is capped at 0.1.0). Observed in this repo: harness landed
          # 0.1.0 via a first `fix`, while release-please *proposed* docxport/forge
          # at 1.0.0 for a first `feat` in release PR #86 (corrected before merge —
          # the landed tags are docxport-v0.1.0 / forge-v0.1.0).
          # Seeding at 0.1.0 removes the 0.0.0 bootstrap entirely: from 0.1.0
          # every feat is 0.(x+1).0, so the 1.0.0 jump cannot occur.
          #
          # Why not >= 1.0.0: new skills are pre-major (0.x) by convention.
          FAIL=0
          while IFS= read -r KEY; do
            VERSION=$(jq -r --arg k "$KEY" '.[$k]' /tmp/head-manifest.json)
            if ! printf '%s' "$VERSION" | grep -qE '^0\.[1-9][0-9]*\.(0|[1-9][0-9]*)$'; then
              echo "::error file=.release-please-manifest.json::New entry '$KEY' must register at a plain pre-major version 0.1.0+ (major=0, minor>=1, no leading zeros, no pre-release or build suffix). Got: $VERSION. Seed the manifest at 0.1.0 — never 0.0.0 (release-please promotes a first feat from 0.0.0 to 1.0.0)."
              FAIL=1
            fi
          done <<< "$NEW_KEYS"

          if [ "$FAIL" -ne 0 ]; then
            cat <<'EOF'
          One or more new manifest entries violate the initial-version policy.
          Register each new component at 0.1.0 (major=0, minor>=1) so release-please
          bumps it as 0.(x+1).0 on each feat and never promotes it to 1.0.0.
          Set both the manifest value and the skill's SKILL.md version to 0.1.0 in
          the registering PR.
          EOF
            exit 1
          fi
          echo "OK: all new entries start at a pre-major 0.1.0+ version"
