name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  dispatch-publish:
    name: Dispatch publish for each released package
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      # Per-package outputs (e.g. `skills/skill-kit--tag_name`) are not accessible
      # by dynamic key from a different job, so we re-query GitHub Releases to
      # find the freshly created tag for each released path and dispatch publish.yml.
      # workflow_dispatch is one of the two events the default GITHUB_TOKEN is
      # allowed to trigger, so no PAT is required.
      - name: Dispatch publish.yml per released package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          set -euo pipefail
          echo "Released paths: $PATHS_RELEASED"
          echo "$PATHS_RELEASED" | jq -r '.[]' | while read -r path; do
            SKILL="$(basename "$path")"
            TAG="$(gh release list -R "$REPO" --limit 30 \
              --json tagName,createdAt \
              --jq "[.[] | select(.tagName | startswith(\"${SKILL}-v\"))] | sort_by(.createdAt) | reverse | first | .tagName")"
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::warning::No release tag found for $SKILL — skipping"
              continue
            fi
            echo "::notice::Dispatching publish.yml for $TAG (path=$path)"
            gh workflow run publish.yml -R "$REPO" --ref "$TAG" -f tag_name="$TAG"
          done
